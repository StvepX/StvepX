<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StvepX</title>
    <link rel="icon" type="image/png" href="https://s41.ax1x.com/2026/05/31/pmkgEAs.png">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    html {
        font-size: clamp(14px, 2.5vw, 24px);
    }
    
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 1.5rem;
        padding-top: 6rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
    }
    
    .top-center {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        text-align: center;
        padding: 1rem;
        z-index: 1000;
    }
    
    .top-center h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
    }
    
    .top-center h2 {
        font-size: clamp(1.3rem, 3.5vw, 2rem);
    }
    
    .top-center h3 {
        font-size: clamp(1.1rem, 3vw, 1.75rem);
    }
    
    .top-center h4 {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
    }
    
    .top-center h5 {
        font-size: clamp(0.9rem, 2vw, 1.25rem);
    }
    
    .top-center h6 {
        font-size: clamp(0.8rem, 1.8vw, 1.1rem);
    }
    
    .container {
        text-align: center;
        max-width: 65ch;
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    footer {
        text-align: center;
        padding: 2rem 1rem;
        font-size: 0.875rem;
    }
    
    h1 {
        font-size: clamp(1.8rem, 5vw, 3rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    h2 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    h3 {
        font-size: clamp(1.25rem, 3.5vw, 2rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    h4 {
        font-size: clamp(1.1rem, 3vw, 1.75rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    h5 {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    h6 {
        font-size: clamp(0.9rem, 2vw, 1.25rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }
    
    p {
        font-size: 1rem;
    }
    
    a {
        text-decoration: none;
    }
    
    @media (prefers-color-scheme: light) {
        body {
            background: #f5f5f5;
            color: #333;
        }
        
        .top-center {
            background: rgba(255, 255, 255, 0.9);
        }
        
        p {
            color: #666;
        }
        
        a {
            color: #0066cc;
        }
        
        footer {
            color: #888;
        }
    }
    
    @media (prefers-color-scheme: dark) {
        body {
            background: #1a1a1a;
            color: #fff;
        }
        
        .top-center {
            background: #1a1a1a;
        }
        
        p {
            color: #aaa;
        }
        
        a {
            color: #4dabf7;
        }
        
        footer {
            color: #888;
        }
    }
    </style>
</head>
<body>
    <div class="top-center h1">
      <h1>StvepX 信息库</h1>
    </div>
    
    <div class="container">
      <h3>👋你好，我是StvepX。</h3>
      <h4>关于我的所有信息都会在这里发布，<br>你可以把这里看成我的信息中心。</h4>
    </div>
    
    <footer>
    <p>© 2026 <a href="https://stvepx.github.io/StvepX/">StvepX</a>. All rights reserved.</p>
    </footer>
</body>
</html>
