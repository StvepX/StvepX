<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StvepX</title>
    <link rel="icon" type="image/png" href="https://s41.ax1x.com/2026/05/31/pmkgEAs.png">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        font-size: clamp(14px, 2.5vw, 24px);
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 1.5rem;
        padding-top: 6rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
    }

    .top-center {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        text-align: center;
        padding: 1rem;
        z-index: 1000;
    }

    .top-center h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
    }

    .top-center h2 {
        font-size: clamp(1.3rem, 3.5vw, 2rem);
    }

    .top-center h3 {
        font-size: clamp(1.1rem, 3vw, 1.75rem);
    }

    .top-center h4 {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
    }

    .top-center h5 {
        font-size: clamp(0.9rem, 2vw, 1.25rem);
    }

    .top-center h6 {
        font-size: clamp(0.8rem, 1.8vw, 1.1rem);
    }

    .container {
        text-align: center;
        max-width: 65ch;
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    footer {
        text-align: center;
        padding: 2rem 1rem;
        font-size: 0.875rem;
    }

    h1 {
        font-size: clamp(1.8rem, 5vw, 3rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    h2 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    h3 {
        font-size: clamp(1.25rem, 3.5vw, 2rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    h4 {
        font-size: clamp(1.1rem, 3vw, 1.75rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    h5 {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    h6 {
        font-size: clamp(0.9rem, 2vw, 1.25rem);
        margin-bottom: 0.5em;
        line-height: 1.2;
    }

    p {
        font-size: 1rem;
    }

    a {
        text-decoration: none;
    }

    @media (prefers-color-scheme: light) {
        body {
            background: #f5f5f5;
            color: #333;
        }

        .top-center {
            background: rgba(255, 255, 255, 0.9);
        }

        p {
            color: #666;
        }

        a {
            color: #0066cc;
        }

        footer {
            color: #888;
        }
    }

    @media (prefers-color-scheme: dark) {
        body {
            background: #1a1a1a;
            color: #fff;
        }

        .top-center {
            background: #1a1a1a;
        }

        p {
            color: #aaa;
        }

        a {
            color: #4dabf7;
        }

        footer {
            color: #888;
        }
    }
    </style>
</head>
<body>
    <div class="top-center h1">
      <h1>StvepX 信息库</h1>
    </div>

    <div class="container">
      <h3>👋你好，我是StvepX。</h3>
      <h4>关于我的所有信息都会在这里发布，<br>你可以把这里看成我的信息中心。</h4>
    </div>

    <footer>
    <p>© <span id="year">2026</span> <a href="https://stvepx.github.io/StvepX/" id="qq-link">StvepX</a>. All rights reserved.</p>
    </footer>

    <script>
    (function() {
        var QQ_UIN = "2307006613";
        var WEB_URL = "https://stvepx.github.io/StvepX/";
        var FALLBACK_DELAY = 15000;
        var link = document.getElementById("qq-link");
        var fallbackTimer = null;
        var pageHidden = false;

        function getEnv() {
            var ua = navigator.userAgent.toLowerCase();
            var ua2 = navigator.userAgent;
            var platform = function(os) {
                var ver = ("" + (new RegExp(os + "(\d+((\.|_)\d+)*)").exec(ua) || [,0])[1]).replace(/_/g, ".");
                return !!parseFloat(ver);
            };
            return {
                is_ios: platform("os "),
                is_android: platform("android[/ ]"),
                is_wx: /MicroMessenger\/([\d\.]+)/.test(ua2),
                is_chrome: (ua.match(/chrome\/([\d.]+)/ig) || ua.match(/CriOS\/([\d.]+)/)) ? true : false
            };
        }

        function buildScheme(env) {
            var base = "mqqapi://card/show_pslcard?src_type=internal&version=1&uin=" + QQ_UIN + "&card_type=person&source=qrcode";
            if (env.is_android && env.is_chrome && !env.is_wx) {
                return "intent://card/show_pslcard?src_type=internal&version=1&uin=" + QQ_UIN + "&card_type=person&source=qrcode#Intent;scheme=mqqapi;package=com.tencent.mobileqq;end";
            }
            return base;
        }

        function clearFallback() {
            if (fallbackTimer) {
                clearTimeout(fallbackTimer);
                fallbackTimer = null;
            }
        }

        function scheduleFallback() {
            clearFallback();
            fallbackTimer = setTimeout(function() {
                if (!pageHidden) {
                    window.location.href = WEB_URL;
                }
            }, FALLBACK_DELAY);
        }

        function onVisibilityChange() {
            if (document.hidden || document.webkitHidden) {
                pageHidden = true;
                clearFallback();
            } else {
                pageHidden = false;
            }
        }

        document.addEventListener("visibilitychange", onVisibilityChange);
        document.addEventListener("webkitvisibilitychange", onVisibilityChange);
        window.addEventListener("pagehide", function() {
            pageHidden = true;
            clearFallback();
        });
        window.addEventListener("blur", function() {
            pageHidden = true;
            clearFallback();
        });

        function callQQ(env) {
            var scheme = buildScheme(env);

            if (env.is_wx) {
                if (typeof WeixinJSBridge === "object" && typeof WeixinJSBridge.invoke === "function") {
                    wxCallQQ(scheme);
                } else if (document.addEventListener) {
                    document.addEventListener("WeixinJSBridgeReady", function() {
                        wxCallQQ(scheme);
                    }, false);
                }
                return;
            }

            scheduleFallback();

            if (env.is_android && !env.is_chrome) {
                var iframe = document.createElement("iframe");
                iframe.style.cssText = "display:none;width:0px;height:0px;";
                setTimeout(function() {
                    iframe.src = scheme;
                    document.body.appendChild(iframe);
                }, 500);
            } else {
                window.location.href = scheme;
            }
        }

        function wxCallQQ(url) {
            var callTimestamp = Date.now();
            var isCallbacked = 0;

            scheduleFallback();

            var interval = setInterval(function() {
                var now = Date.now();
                if (isCallbacked) {
                    if (now - callTimestamp > 650) {
                        clearInterval(interval);
                    } else if (isCallbacked > 5) {
                        clearInterval(interval);
                    }
                    callTimestamp = now;
                    isCallbacked++;
                } else {
                    callTimestamp = now;
                }
            }, 500);

            WeixinJSBridge.invoke("launchApplication", {
                "schemeUrl": url
            }, function(res) {
                if ("launchApplication:failed" === res.err_msg) {
                    clearFallback();
                    window.location.href = WEB_URL;
                } else {
                    isCallbacked = 1;
                }
            });
        }

        link.addEventListener("click", function(e) {
            e.preventDefault();
            var env = getEnv();
            callQQ(env);
        });
    })();
    </script>

    <script>
    (function() {
        var yearEl = document.getElementById("year");
        yearEl.textContent = new Date().getFullYear();
        
        fetch("https://quan.suning.com/getSysTime.do")
            .then(function(r) { return r.json(); })
            .then(function(data) {
                yearEl.textContent = data.sysTime2.slice(0, 4);
            })
            .catch(function() {
                return fetch("https://api.m.taobao.com/rest/api3.do?api=mtop.common.getTimestamp")
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        yearEl.textContent = new Date(Number(data.data.t)).getFullYear();
                    });
            })
            .catch(function() {});
    })();
    </script>
</body>
</html>
